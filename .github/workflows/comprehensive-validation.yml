name: Comprehensive Validation Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Full Validation Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify system memory file
        run: |
          if [ ! -f ".infinity/ACTIVE_MEMORY.md" ]; then
            echo "::error file=.infinity/ACTIVE_MEMORY.md::ACTIVE_MEMORY.md is missing."
            exit 1
          fi
          echo "✓ .infinity/ACTIVE_MEMORY.md present"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Stage 1: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Stage 2: Code Quality — ESLint
      - name: Run ESLint
        id: lint
        run: npm run lint

      # Stage 3: TypeScript type checking (strict)
      - name: Type-check (strict)
        id: typecheck
        run: npx tsc --noEmit

      # Stage 4: Security audit
      - name: Dependency security audit
        id: audit
        run: npm audit --audit-level=high

      # Stage 5: Build validation
      - name: Build
        id: build
        run: npm run build

      # Stage 6: Bundle size report
      - name: Bundle size check
        if: steps.build.outcome == 'success'
        run: |
          echo "=== Bundle Size Report ===" >> $GITHUB_STEP_SUMMARY
          du -sh dist/assets/* | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total dist size: $(du -sh dist/ | cut -f1)" >> $GITHUB_STEP_SUMMARY

      # Stage 7: Validation summary (reflects actual step outcomes)
      - name: Validation summary
        if: always()
        run: |
          lint_status="${{ steps.lint.outcome == 'success' && '✅ Passed' || '❌ Failed' }}"
          types_status="${{ steps.typecheck.outcome == 'success' && '✅ Passed' || '❌ Failed' }}"
          audit_status="${{ steps.audit.outcome == 'success' && '✅ Passed' || '❌ Failed' }}"
          build_status="${{ steps.build.outcome == 'success' && '✅ Passed' || '❌ Failed' }}"

          if [[ "${{ steps.lint.outcome }}" == "success" && "${{ steps.typecheck.outcome }}" == "success" && "${{ steps.audit.outcome }}" == "success" && "${{ steps.build.outcome }}" == "success" ]]; then
            headline="## ✅ Validation Pipeline Complete"
          else
            headline="## ❌ Validation Pipeline — Issues Detected"
          fi

          echo "$headline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | $lint_status |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | $types_status |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | $audit_status |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $build_status |" >> $GITHUB_STEP_SUMMARY
