name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint, Audit & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify system memory file
        run: |
          if [ ! -f ".infinity/ACTIVE_MEMORY.md" ]; then
            echo "::error file=.infinity/ACTIVE_MEMORY.md::ACTIVE_MEMORY.md is missing. Run the memory regeneration script or restore .infinity/ACTIVE_MEMORY.md before merging."
            exit 1
          fi
          echo "✓ .infinity/ACTIVE_MEMORY.md present"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run security audit
        run: npm audit --audit-level=high

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:3000/api' }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL || 'ws://localhost:3000' }}

      - name: Verify agent integrity
        run: |
          # Verify all 13 agents are registered in agentTypes.ts
          AGENTS=("PlannerAgent" "ResearchAgent" "BuilderAgent" "ScraperAgent" "MediaAgent"
                  "ValidatorAgent" "DevOpsAgent" "MonitoringAgent" "KnowledgeAgent"
                  "BusinessAgent" "PredictionAgent" "SimulationAgent" "MetaAgent")
          for agent in "${AGENTS[@]}"; do
            if ! grep -q "\"${agent}\"" src/lib/agentTypes.ts; then
              echo "::error::${agent} missing from agentTypes.ts"
              exit 1
            fi
          done
          echo "✅ All 13 agents verified in agentTypes.ts"

      - name: Verify LLM router has Ollama + Groq
        run: |
          if ! grep -q "ollama" src/lib/llm.ts; then
            echo "::error::Ollama provider missing from llm.ts"
            exit 1
          fi
          echo "✅ LLM router: Groq + Ollama providers present"
