name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type-check (strict)
        run: npm run type-check

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://xpsintelligencesystem-production.up.railway.app/api' }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL || 'wss://xpsintelligencesystem-production.up.railway.app' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: check-secrets
        run: |
          if [[ -z "$VERCEL_TOKEN" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  VERCEL_TOKEN not set — skipping preview deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview to Vercel
        id: deploy
        if: steps.check-secrets.outputs.configured == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://xps-intelligence.vercel.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: check-secrets
        run: |
          if [[ -z "$VERCEL_TOKEN" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  VERCEL_TOKEN not set — skipping production deploy."
            echo "    Configure VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID"
            echo "    in GitHub repository secrets to enable automatic deployment."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        id: deploy
        if: steps.check-secrets.outputs.configured == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
