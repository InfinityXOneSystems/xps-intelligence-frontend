services:
  # ─── XPS Intelligence Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xps-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000/api}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:3000}
      - VITE_OLLAMA_URL=${VITE_OLLAMA_URL:-http://host.docker.internal:11434}
      - VITE_OLLAMA_MODEL=${VITE_OLLAMA_MODEL:-llama3}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - xps-net

  # ─── GitHub / Docker Desktop Webhook Receiver ─────────────────────────────
  # Receives push events from GitHub and local Docker Desktop.
  # Set DOCKER_WEBHOOK_URL=http://host.docker.internal:3001 in Vercel/GitHub vars.
  webhook-receiver:
    build:
      context: ./docker/webhook-receiver
      dockerfile: Dockerfile
    container_name: xps-webhook-receiver
    ports:
      - "3001:3001"
    environment:
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER:-InfinityXOneSystems}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME:-XPS-INTELLIGENCE-FRONTEND}
      - SYNC_BRANCHES=${SYNC_BRANCHES:-main,master,develop}
      - REPO_DIR=/workspace
      - HANDLER_SCRIPT=/scripts/docker-webhook-handler.sh
      - REPORTER_SCRIPT=/scripts/report-to-github.js
      - WEBHOOK_PORT=3001
      # Local platform path sync (C:\XPS_PLATFORM on Windows host)
      - LOCAL_PLATFORM_PATH=${LOCAL_PLATFORM_PATH:-/xps-platform}
    volumes:
      - .:/workspace
      - ./scripts:/scripts:ro
      # Mount the local XPS_PLATFORM folder for Docker Desktop sync
      # Windows: set LOCAL_PLATFORM_HOST_PATH=C:/XPS_PLATFORM in .env
      - ${LOCAL_PLATFORM_HOST_PATH:-/tmp/xps-platform}:/xps-platform:ro
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - xps-net

networks:
  xps-net:
    driver: bridge
